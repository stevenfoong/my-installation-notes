services:
  traefik:
    image: "traefik:3.6.9"
    container_name: "traefik"
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    environment:
      - CF_DNS_API_TOKEN=${CF_DNS_API_TOKEN}
      - "CLOUDFLARE_EMAIL=kentarogenz@outlook.com"
      - CLOUDFLARE_API_KEY=${CF_DNS_API_TOKEN}

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /data/traefik/certs:/certs:ro
      - /data/traefik/dynamic:/dynamic:ro
      - /data/traefik/config:/etc/traefik
      - /data/traefik/traefik-ssl-certs:/ssl-certs
      - /etc/localtime:/etc/localtime

    command:
      # EntryPoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.websecure.http.tls=true"

      # Attach the static configuration tls.yaml file that contains the tls configuration settings
      - "--providers.file.filename=/dynamic/tls.yaml"

      # Providers 
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      # - "--providers.docker.network=proxy"

      # API & Dashboard 
      - "--api.dashboard=true"
      - "--api.insecure=false"
       
      # Observability 
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--metrics.prometheus=true"

      - "--certificatesresolvers.le.acme.email=your-email@example.com"
      - "--certificatesresolvers.le.acme.storage=/letsencrypt/acme.json" # Path inside container volume
      # - "--certificatesresolvers.le.acme.httpchallenge.entrypoint=dns"

      - "--certificatesresolvers.le.acme.dnschallenge.provider=cloudflare" # Needs provider setup
      - "--certificatesResolvers.le.acme.dnsChallenge.delayBeforeCheck=5"

      # Optionally make 'le' the default resolver for TLS-enabled routers
      - "--entrypoints.websecure.http.tls.certresolver=le"

    labels:
      #- "traefik.enable=true"
      #- "traefik.http.routers.traefik.entrypoints=websecure"
      #- "traefik.http.routers.traefik.tls.certresolver=myresolver"
      #- "traefik.http.routers.traefik.rule=Host(`traefik.domain.id`)"
      #- "traefik.http.routers.traefik.service=api@internal"

      # Traefik Dynamic configuration via Docker labels
      # Enable self‑routing
      - "traefik.enable=true"

      # Dashboard router
      - "traefik.http.routers.dashboard.rule=Host(`dashboard-proxy.ydzfpay.com`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.tls=true"

      # Basic‑auth middleware
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=IwQ2CnpxGmk1OKSgjmVt7Uu6R91d4ZMI:$$apr1$$y0OYGbBt$$gVeBp61pLFMQnKxQbjqa6."
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth@docker"

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "10"
